<section
  class="completed-line-dialog"
  [class.completed-line-dialog--all-found]="isAllFound"
  role="dialog"
  aria-modal="true"
  aria-labelledby="completed-line-title"
>
  <div class="completed-line-dialog__sparkles" aria-hidden="true">
    <span>✨</span>
    <span>🎉</span>
    <span>⭐</span>
  </div>

  <div class="completed-line-dialog__badge" aria-hidden="true">
    @if (isAllFound) {
      🏁
    } @else {
      🎉
    }
  </div>

  <p class="completed-line-dialog__eyebrow">
    Grattis!
  </p>

  <h2 id="completed-line-title">
    {{ title }}
  </h2>

  <p class="completed-line-dialog__message">
    {{ message }}
  </p>

  <div class="completed-line-dialog__actions">
    <button
      type="button"
      class="completed-line-dialog__primary"
      (click)="close('continue')"
    >
      {{ primaryButtonText }}
    </button>

    <button
      type="button"
      (click)="close('new-16')"
    >
      Nytt spel med 16 bilder
    </button>

    <button
      type="button"
      (click)="close('new-32')"
    >
      Nytt spel med 32 bilder
    </button>
  </div>
</section>
